name: Build TVBoxOS APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Android TV APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Show Gradle info
        run: ./gradlew --version

      - name: Build release APK
        run: ./gradlew clean :app:assembleNormalRelease --no-daemon

      - name: List APK files
        run: find app/build/outputs/apk -name "*.apk" -type f -print

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVBoxOS-XiaomiBox-APK
          path: app/build/outputs/apk/**/*.apk
