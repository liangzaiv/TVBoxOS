name: Build TVBoxOS APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Android TV APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Show Gradle info
        run: ./gradlew --version

      - name: Build release APK
        run: ./gradlew clean :app:assembleNormalRelease --no-daemon

      - name: List APK files
        if: always()
        run: |
          echo "===== APK FILES ====="
          find . -name "*.apk" -type f -print || true

      - name: Collect APK files
        if: success()
        run: |
          mkdir -p apk-output
          find . -name "*.apk" -type f -exec cp {} apk-output/ \;
          ls -lh apk-output

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TVBoxOS-XiaomiBox-APK
          path: apk-output/*.apk
